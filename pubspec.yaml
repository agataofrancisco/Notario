name: notario
description: Motor de disciplina para gestão de tempo
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  cloud_functions: ^4.7.6
  firebase_messaging: ^14.9.4
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Google Sign-In
  google_sign_in: ^6.3.0

  # Utils
  get_it: ^7.7.0
  injectable: ^2.4.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.2
  intl: ^0.19.0

  # Networking
  dio: ^5.7.0

  # Local Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # UI
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0

  # Google Calendar
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1
  json_serializable: ^6.8.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
