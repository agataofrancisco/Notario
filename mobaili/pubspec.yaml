name: notario
description: Motor de disciplina para gestão de tempo
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Google APIs
  google_sign_in: ^6.1.5
  googleapis: ^11.4.0
  googleapis_auth: ^1.4.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

  # UI
  intl: ^0.18.1
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

  # Utils
  get_it: ^7.6.4
  injectable: ^2.3.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true

  # assets:
  #   - images/
